on:
  push:
  pull_request:
  merge_group:
  schedule: # Trigger a job on default branch at 4AM PST everyday
    - cron: "0 11 * * *"

name: Build

env:
  RUSTFLAGS: >-
    -D warnings
    -C target-feature=+crt-static

jobs:
  build:
    name: Build
    runs-on: windows-latest
    strategy:
      matrix:
        wdk:
          - 10.0.22621 # NI WDK
          - 10.0.26100 # GE WDK

        llvm:
          - 17.0.6

        rust_toolchain:
          - stable
          # - beta
          # - nightly

        cargo_profile:
          - dev
          # - release

        target_triple:
          - name: x86_64-pc-windows-msvc
            arch: amd64
          - name: aarch64-pc-windows-msvc
            arch: arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Winget
        uses: ./.github/actions/winget-install
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LLVM ${{ matrix.llvm }}
        run: |
          if ((Get-WinGetPackage -Id LLVM -Source winget -MatchOption Equals).InstalledVersion -eq '${{ matrix.llvm }}') {
            Write-Host "LLVM ${{ matrix.llvm }} is already installed."
          } else {
            Write-Host "Installing LLVM ${{ matrix.llvm }}..."
            Install-WinGetPackage -Id LLVM.LLVM -Version ${{ matrix.llvm }} -Source winget -MatchOption Equals -Mode Silent -Force
          }
          clang --version

      - name: Install WDK (${{ matrix.wdk }})
        run: |
          $wdk = '${{ matrix.wdk }}'
          if ($wdk -match '^10\.0\.(\d{5})\.(\d{1,4})$') {
            $majorVersion = [int]$matches[1]
            $minorVersion = [int]$matches[2]
            if ($majorVersion -ge 26100 -and $minorVersion -ge 1) {
              Write-Host "Using pre-installed NuGet to install WDK version $wdk..."
              nuget install WDK -Version $wdk -Source https://nuget.org -NonInteractive -OutputDirectory C:\WDK
            } else {
              Write-Host "Using Winget to install WDK version $wdk..."
              if ((Get-WinGetPackage -Id $wdk -Source winget -MatchOption Equals).Id -eq '$wdk') {
                Write-Host "$wdk is already installed. Attempting to update..."
                Update-WinGetPackage -Id $wdk -Source winget -MatchOption Equals -Mode Silent -Force
              } else {
                Write-Host "Installing $wdk..."
                Install-WinGetPackage -Id $wdk -Source winget -MatchOption Equals -Mode Silent -Force
              }
            }
          } else {
            Write-Host "WDK version $wdk does not match the required format 10.0.{5 digit number}.{1 to 4 digit number}"
            exit 1
          }

      - name: Install Rust Toolchain (${{ matrix.rust_toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_toolchain }}
          targets: |
            ${{ matrix.target_triple.name }}

      - name: Install Cargo Make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Run Cargo Make (package-driver-flow) in Workspace
        run: cargo make package-driver-flow +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }} --workspace

      - name: Test wdk-pre-commit-flow cargo-make task
        run: cargo make wdk-pre-commit-flow
      
      - name: Build Examples (via Cargo Make)
        run: cargo make --cwd ./examples build +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }}

      - name: Package Examples (via Cargo Make)
        run: cargo make --cwd ./examples package-driver-flow +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }}

      